<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة الألعاب المتاحة</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #17212b;
            --tg-theme-text-color: #f5f5f5;
            --tg-theme-button-color: #5288c1;
            --tg-theme-button-text-color: #ffffff;
            --tg-theme-hint-color: #708499;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0;
            padding: 15px;
            user-select: none;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h3 { margin: 5px 0; font-size: 1.3rem; }
        .header p { color: var(--tg-theme-hint-color); font-size: 0.9rem; margin: 0; }
        
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
            padding-bottom: 30px;
        }
        .game-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .game-card:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.1);
        }
        .game-icon {
            width: 70px;
            height: 70px;
            border-radius: 15px;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 8px;
        }
        .game-name {
            font-size: 0.85rem;
            font-weight: bold;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            height: 34px;
            line-height: 17px;
        }
        .no-data {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--tg-theme-hint-color);
            padding: 40px 0;
        }
    </style>
</head>
<body>

    <div class="header">
        <h3 id="view-title">🎮 اختر اللعبة المُراد ربطها</h3>
        <p id="view-subtitle">سيتم تفعيل اللعبة للجهاز النشط فوراً</p>
    </div>

    <div id="games-container" class="games-grid">
        </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // استخراج البيانات الممررة من البوت عبر الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const osType = urlParams.get('os') || 'ios';
        const devName = urlParams.get('dev') || 'الجهاز';

        document.getElementById('view-subtitle').innerText = `الجهاز النشط حالياً: ${devName} (${osType.toUpperCase()})`;

        // محاكاة قواعد البيانات - سيقوم البوت بحقنها أو تمريرها كـ JSON كبير
        // لضمان السرعة والعمل بدون إنترنت، سنطلب من البوت تمرير البيانات في مصفوفة مخصصة
        async function loadGames() {
            const container = document.getElementById('games-container');
            container.innerHTML = '';

            try {
                // جلب البيانات من ملفات المشروع المحلية الممررة عبر السيرفر
                // ملاحظة: استبدل المسار بمسار استضافتك أو الـ API الخاص بالبوت
                const response = await fetch(`./get_games?os=${osType}`);
                const games = await response.json();

                if (Object.keys(games).length === 0) {
                    container.innerHTML = '<div class="no-data">📭 لا توجد ألعاب متوفرة لهذا النظام حالياً</div>';
                    return;
                }

                for (const [key, game] of Object.entries(games)) {
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    
                    // استخدام الأيقونة الافتراضية إذا لم تكن متوفرة في الملف
                    const iconUrl = game.icon || 'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=150';

                    card.innerHTML = `
                        <img class="game-icon" src="${iconUrl}" onerror="this.src='https://images.unsplash.com/photo-1542751371-adc38448a05e?w=150'">
                        <div class="game-name">${game.name}</div>
                    `;

                    card.onclick = () => {
                        // إرسال كود اللعبة للبوت وإغلاق النافذة فوراً
                        tg.sendData(JSON.stringify({
                            action: "select_game",
                            os: osType,
                            game_key: key,
                            game_name: game.name
                        }));
                        tg.close();
                    };
                    container.appendChild(card);
                }
            } catch (error) {
                container.innerHTML = '<div class="no-data">❌ حدث خطأ أثناء الاتصال البرمجي بالخادم</div>';
            }
        }

        loadGames();
    </script>
</body>
</html>
